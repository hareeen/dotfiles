name: Push Image (fastmri)

on:
  push:
    branches:
      - fastmri

jobs:
  push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: easimon/maximize-build-space@v10
        with:
          remove-dotnet: true
          remove-android: true

      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: slowGPU/burning_gpu
          path: burning_gpu
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            requirements.txt

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Projects/fastmri/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/fastmri:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
